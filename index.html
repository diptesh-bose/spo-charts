<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Performance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308; --purple: #a855f7;
    --orange: #f97316; --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  .header { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 1.5rem; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .filters { display: flex; gap: 12px; align-items: center; }
  .filters select, .filters input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }
  .filters select:focus, .filters input:focus { outline: none; border-color: var(--accent); }
  .container { padding: 24px 32px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .kpi .label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi .value { font-size: 1.8rem; font-weight: 700; }
  .kpi .change { font-size: 0.8rem; margin-top: 4px; }
  .kpi .change.up { color: var(--green); }
  .kpi .change.down { color: var(--red); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; }
  .chart-box { position: relative; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge-green { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
  .badge-red { background: rgba(239,68,68,.15); color: var(--red); }
  .badge-blue { background: rgba(59,130,246,.15); color: var(--accent); }
  .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar .fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; border-radius: 8px; background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; }
  .tab.active { background: var(--accent); color: #fff; }
  @media (max-width: 1024px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1><span>SPO</span> Sales Dashboard</h1>
  <div class="filters">
    <select id="filterRegion">
      <option value="all">All Regions</option>
      <option value="north">North America</option>
      <option value="europe">Europe</option>
      <option value="apac">APAC</option>
      <option value="latam">LATAM</option>
    </select>
    <select id="filterQuarter">
      <option value="Q2-2026">Q2 2026</option>
      <option value="Q1-2026">Q1 2026</option>
      <option value="Q4-2025">Q4 2025</option>
      <option value="Q3-2025">Q3 2025</option>
    </select>
    <select id="filterTeam">
      <option value="all">All Teams</option>
      <option value="enterprise">Enterprise</option>
      <option value="mid-market">Mid-Market</option>
      <option value="smb">SMB</option>
    </select>
  </div>
</div>

<div class="container">
  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Revenue + Pipeline -->
  <div class="grid-2">
    <div class="card">
      <h3>Monthly Revenue Trend</h3>
      <div class="chart-box" style="height:240px"><canvas id="revenueChart"></canvas></div>
    </div>
    <div class="card">
      <h3>Pipeline by Stage</h3>
      <div class="chart-box" style="height:240px"><canvas id="pipelineChart"></canvas></div>
    </div>
  </div>

  <!-- Rep Engagement + Meeting Metrics -->
  <div class="grid-2">
    <div class="card">
      <h3>Sales Rep Engagement Metrics</h3>
      <div class="tabs">
        <button class="tab active" data-tab="calls">Calls</button>
        <button class="tab" data-tab="emails">Emails</button>
        <button class="tab" data-tab="demos">Demos</button>
      </div>
      <div class="chart-box" style="height:200px"><canvas id="engagementChart"></canvas></div>
    </div>
    <div class="card">
      <h3>Meeting Metrics with Customers</h3>
      <div class="chart-box" style="height:240px"><canvas id="meetingChart"></canvas></div>
    </div>
  </div>

  <!-- Win/Loss + Conversion -->
  <div class="grid-3">
    <div class="card">
      <h3>Win/Loss Analysis</h3>
      <div class="chart-box" style="height:220px"><canvas id="winLossChart"></canvas></div>
    </div>
    <div class="card">
      <h3>Conversion Funnel</h3>
      <div class="chart-box" style="height:220px"><canvas id="funnelChart"></canvas></div>
    </div>
    <div class="card">
      <h3>Deal Size Distribution</h3>
      <div class="chart-box" style="height:220px"><canvas id="dealSizeChart"></canvas></div>
    </div>
  </div>

  <!-- Leaderboard + Activity -->
  <div class="grid-2">
    <div class="card">
      <h3>Rep Leaderboard</h3>
      <table id="leaderboardTable">
        <thead><tr><th>Rep</th><th>Closed</th><th>Quota %</th><th>Pipeline</th><th>Status</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="card">
      <h3>Recent Activity Feed</h3>
      <div id="activityFeed" style="max-height:320px;overflow-y:auto;"></div>
    </div>
  </div>
</div>

const fmt = n => n >= 1e6 ? '$' + (n/1e6).toFixed(1) + 'M' : n >= 1e3 ? '$' + (n/1e3).toFixed(0) + 'K' : '$' + n;
const chartDefaults = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } }, scales: {} };
const axisStyle = { ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: 'rgba(51,65,85,0.5)' } };

let charts = {};
let currentTab = 'calls';

function renderKPIs(d) {
  const k = d.kpis;
  const quotaPct = ((k.revenue / k.target) * 100).toFixed(0);
  document.getElementById('kpiRow').innerHTML = [
    { label: 'Revenue', value: fmt(k.revenue), change: `${quotaPct}% of target`, up: quotaPct >= 80 },
    { label: 'Total Deals', value: k.deals, change: '+12% vs last Q', up: true },
    { label: 'Avg Deal Size', value: fmt(k.avgDeal), change: '+5% vs last Q', up: true },
    { label: 'Pipeline Value', value: fmt(k.pipeline), change: '2.5x coverage', up: true },
    { label: 'Win Rate', value: k.winRate + '%', change: k.winRate >= 33 ? '+2pp' : '-1pp', up: k.winRate >= 33 },
    { label: 'Meetings Held', value: k.meetings, change: '+8% vs last Q', up: true },
    { label: 'Customer NPS', value: k.nps, change: k.nps >= 70 ? 'Above target' : 'Below target', up: k.nps >= 70 }
  ].map(i => `<div class="kpi"><div class="label">${i.label}</div><div class="value">${i.value}</div><div class="change ${i.up?'up':'down'}">${i.up?'&#9650;':'&#9660;'} ${i.change}</div></div>`).join('');
}

function makeChart(id, cfg) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), cfg);
}

function renderRevenue(d) {
  makeChart('revenueChart', {
    type: 'bar',
    data: {
      labels: d.revenueMonths,
      datasets: [
        { label: 'Closed Revenue ($K)', data: d.revenueClosed, backgroundColor: '#3b82f6', borderRadius: 6 },
        { label: 'Target ($K)', data: d.revenueTarget, type: 'line', borderColor: '#eab308', borderDash: [6,4], pointRadius: 0, fill: false }
      ]
    },
    options: { ...chartDefaults, scales: { x: axisStyle, y: { ...axisStyle, beginAtZero: true } } }
  });
}

function renderPipeline(d) {
  const colors = ['#3b82f6','#06b6d4','#a855f7','#f97316','#22c55e'];
  makeChart('pipelineChart', {
    type: 'bar',
    data: {
      labels: d.pipeline.stages,
      datasets: [{ label: 'Value ($K)', data: d.pipeline.values, backgroundColor: colors, borderRadius: 6 }]
    },
    options: { ...chartDefaults, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { ...axisStyle, beginAtZero: true }, y: axisStyle } }
  });
}

function renderEngagement(d, tab) {
  const ed = d.engagement[tab];
  makeChart('engagementChart', {
    type: 'bar',
    data: {
      labels: ed.reps,
      datasets: [{ label: tab.charAt(0).toUpperCase() + tab.slice(1), data: ed.values, backgroundColor: tab === 'calls' ? '#3b82f6' : tab === 'emails' ? '#a855f7' : '#22c55e', borderRadius: 6 }]
    },
    options: { ...chartDefaults, plugins: { legend: { display: false } }, scales: { x: axisStyle, y: { ...axisStyle, beginAtZero: true } } }
  });
}

function renderMeetings(d) {
  makeChart('meetingChart', {
    type: 'bar',
    data: {
      labels: d.meetings.types,
      datasets: [
        { label: 'Booked', data: d.meetings.booked, backgroundColor: '#3b82f6', borderRadius: 4 },
        { label: 'Completed', data: d.meetings.completed, backgroundColor: '#22c55e', borderRadius: 4 },
        { label: 'No-show', data: d.meetings.noShow, backgroundColor: '#ef4444', borderRadius: 4 }
      ]
    },
    options: { ...chartDefaults, scales: { x: axisStyle, y: { ...axisStyle, beginAtZero: true } } }
  });
}

function renderWinLoss(d) {
  makeChart('winLossChart', {
    type: 'doughnut',
    data: {
      labels: ['Won','Lost','Pending'],
      datasets: [{ data: [d.winLoss.won, d.winLoss.lost, d.winLoss.pending], backgroundColor: ['#22c55e','#ef4444','#eab308'], borderWidth: 0 }]
    },
    options: { ...chartDefaults, cutout: '60%' }
  });
}

function renderFunnel(d) {
  const maxVal = Math.max(...d.funnel.values);
  const colors = ['#3b82f6','#06b6d4','#a855f7','#f97316','#22c55e'];
  makeChart('funnelChart', {
    type: 'bar',
    data: {
      labels: d.funnel.stages,
      datasets: [{ data: d.funnel.values, backgroundColor: colors, borderRadius: 6 }]
    },
    options: { ...chartDefaults, plugins: { legend: { display: false } }, scales: { x: axisStyle, y: { ...axisStyle, beginAtZero: true } } }
  });
}

function renderDealSize(d) {
  makeChart('dealSizeChart', {
    type: 'pie',
    data: {
      labels: d.dealSize.ranges,
      datasets: [{ data: d.dealSize.counts, backgroundColor: ['#64748b','#3b82f6','#06b6d4','#a855f7','#22c55e'], borderWidth: 0 }]
    },
    options: { ...chartDefaults }
  });
}

function renderLeaderboard(d) {
  const tbody = document.querySelector('#leaderboardTable tbody');
  tbody.innerHTML = d.leaderboard.map(r => {
    const badgeCls = r.status === 'green' ? 'badge-green' : r.status === 'yellow' ? 'badge-yellow' : 'badge-red';
    const statusLabel = r.status === 'green' ? 'On Track' : r.status === 'yellow' ? 'At Risk' : 'Behind';
    return `<tr>
      <td>${r.name}</td>
      <td>${fmt(r.closed)}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><span>${r.quota}%</span><div class="progress-bar" style="width:80px"><div class="fill" style="width:${Math.min(r.quota,100)}%;background:${r.status==='green'?'var(--green)':r.status==='yellow'?'var(--yellow)':'var(--red)'}"></div></div></div></td>
      <td>${fmt(r.pipeline)}</td>
      <td><span class="badge ${badgeCls}">${statusLabel}</span></td>
    </tr>`;
  }).join('');
}

function renderActivity(d) {
  document.getElementById('activityFeed').innerHTML = d.activities.map(a => {
    const dotColor = a.type === 'green' ? 'var(--green)' : a.type === 'red' ? 'var(--red)' : a.type === 'yellow' ? 'var(--yellow)' : 'var(--accent)';
    return `<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="min-width:8px;margin-top:6px;width:8px;height:8px;border-radius:50%;background:${dotColor}"></div>
      <div><div style="font-size:0.85rem"><strong>${a.rep}</strong> ${a.action}</div><div style="font-size:0.8rem;color:var(--muted)">${a.detail}</div><div style="font-size:0.75rem;color:var(--muted);margin-top:2px">${a.time}</div></div>
    </div>`;
  }).join('');
}

function renderAll() {
  const region = document.getElementById('filterRegion').value;
  const d = DATA[region];
  renderKPIs(d);
  renderRevenue(d);
  renderPipeline(d);
  renderEngagement(d, currentTab);
  renderMeetings(d);
  renderWinLoss(d);
  renderFunnel(d);
  renderDealSize(d);
  renderLeaderboard(d);
  renderActivity(d);
}

document.getElementById('filterRegion').addEventListener('change', renderAll);
document.getElementById('filterQuarter').addEventListener('change', renderAll);
document.getElementById('filterTeam').addEventListener('change', renderAll);

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    const region = document.getElementById('filterRegion').value;
    renderEngagement(DATA[region], currentTab);
  });
});

renderAll();
</script>
</body>
</html>
